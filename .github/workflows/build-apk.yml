name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
    
    - name: Install dependencies
      run: npm install
    
    - name: Build React app
      run: npm run build
    
    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Install Capacitor CLI
      run: npm install -g @capacitor/cli
    
    - name: Sync Capacitor
      run: npx cap sync android
    
    - name: Set up signing properties
      if: ${{ secrets.RELEASE_KEYSTORE_BASE64 != '' }}
      run: |
        echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 -d > android/mengxu-release-key.jks
        echo "storeFile=mengxu-release-key.jks" > android/signing.properties
        echo "storePassword=${{ secrets.RELEASE_KEYSTORE_PASSWORD }}" >> android/signing.properties
        echo "keyAlias=${{ secrets.RELEASE_KEY_ALIAS }}" >> android/signing.properties
        echo "keyPassword=${{ secrets.RELEASE_KEY_PASSWORD }}" >> android/signing.properties
    
    - name: Build Debug APK
      run: |
        cd android
        ./gradlew assembleDebug
    
    - name: Build Release APK
      run: |
        cd android
        ./gradlew assembleRelease
    
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug.apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
    
    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release.apk
        path: android/app/build/outputs/apk/release/app-release.apk
